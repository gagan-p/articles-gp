name: Convert org to qmd

on:
  push:
    branches:
      - main
    paths:
      - "articles_original_org/*.org"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: '1.8.27'

      - name: Convert org files to qmd
        run: |
          find articles_original_org -name "*.org" | while read f; do
            base=$(basename "$f" .org)
            quarto pandoc "$f" \
              --from org \
              --to markdown+yaml_metadata_block \
              --standalone \
              -o "articles/${base}.qmd"
            sed -i -E 's/^``` ?(ojs|python|r|julia)$/```{\1}/' \
              "articles/${base}.qmd"
            if [ -f "articles_original_org/${base}.css" ]; then
              cp "articles_original_org/${base}.css" "articles/${base}.css"
              css_file="${base}.css"
            else
              css_file="styles.css"
            fi
            sed -i "2i css: ${css_file}" "articles/${base}.qmd"
            echo "Converted: $f -> articles/${base}.qmd (css: ${css_file})"
          done

      - name: Commit converted qmd files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "github-actions[bot]@users.noreply.github.com"
          git add articles/*.qmd articles/*.css 2>/dev/null || git add articles/*.qmd
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: convert org sources to qmd"
            git push
          fi
